<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e2a"/>
      <stop offset="30%" style="stop-color:#1a1a4e"/>
      <stop offset="60%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="trials" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c8a"/>
      <stop offset="50%" style="stop-color:#3a6a7a"/>
      <stop offset="100%" style="stop-color:#2a5a6a"/>
    </linearGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4874a"/>
      <stop offset="50%" style="stop-color:#b87333"/>
      <stop offset="100%" style="stop-color:#8b5a2b"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="600" fill="url(#sky)"/>
  
  <!-- Atmospheric glows -->
  <ellipse cx="400" cy="200" rx="400" ry="250" fill="url(#glow1)" filter="url(#blur2)"/>
  <ellipse cx="1400" cy="150" rx="350" ry="200" fill="url(#glow2)" filter="url(#blur2)"/>
  <ellipse cx="960" cy="300" rx="500" ry="200" fill="#1a237e" opacity="0.3" filter="url(#blur2)"/>
  
  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="100" cy="50" r="1.5"/><circle cx="250" cy="80" r="1"/>
    <circle cx="400" cy="30" r="1.2"/><circle cx="550" cy="90" r="0.8"/>
    <circle cx="700" cy="40" r="1.5"/><circle cx="850" cy="70" r="1"/>
    <circle cx="1000" cy="25" r="1.3"/><circle cx="1150" cy="85" r="0.9"/>
    <circle cx="1300" cy="45" r="1.4"/><circle cx="1450" cy="75" r="1.1"/>
    <circle cx="1600" cy="35" r="1.5"/><circle cx="1750" cy="65" r="1"/>
    <circle cx="180" cy="120" r="0.8"/><circle cx="480" cy="140" r="1.2"/>
    <circle cx="780" cy="110" r="0.9"/><circle cx="1080" cy="130" r="1.1"/>
    <circle cx="1380" cy="100" r="0.7"/><circle cx="1680" cy="125" r="1.3"/>
    <circle cx="320" cy="160" r="0.6"/><circle cx="620" cy="170" r="1"/>
    <circle cx="920" cy="155" r="0.8"/><circle cx="1220" cy="165" r="1.2"/>
    <circle cx="1520" cy="150" r="0.9"/><circle cx="1820" cy="140" r="1"/>
  </g>
  
  <!-- Moon -->
  <circle cx="1600" cy="80" r="45" fill="#e8eaf6" opacity="0.85" filter="url(#glow-strong)"/>
  <circle cx="1618" cy="70" r="40" fill="url(#sky)"/>
  
  <!-- Trial Chamber structure (center piece) -->
  <g transform="translate(700,180)">
    <!-- Main chamber walls -->
    <rect x="0" y="60" width="520" height="240" fill="#2a4a4a" opacity="0.6" rx="4"/>
    <rect x="10" y="70" width="500" height="220" fill="#1a3a3a" opacity="0.7" rx="2"/>
    
    <!-- Copper pillars -->
    <rect x="20" y="70" width="30" height="220" fill="url(#copper)" opacity="0.8"/>
    <rect x="470" y="70" width="30" height="220" fill="url(#copper)" opacity="0.8"/>
    <rect x="140" y="70" width="20" height="220" fill="url(#copper)" opacity="0.6"/>
    <rect x="360" y="70" width="20" height="220" fill="url(#copper)" opacity="0.6"/>
    
    <!-- Copper blocks decoration -->
    <rect x="60" y="80" width="60" height="40" fill="#b87333" opacity="0.7" rx="2"/>
    <rect x="400" y="80" width="60" height="40" fill="#b87333" opacity="0.7" rx="2"/>
    <rect x="60" y="240" width="60" height="40" fill="#8b5a2b" opacity="0.6" rx="2"/>
    <rect x="400" y="240" width="60" height="40" fill="#8b5a2b" opacity="0.6" rx="2"/>
    
    <!-- Tuff blocks -->
    <rect x="170" y="80" width="180" height="30" fill="#6b6b6b" opacity="0.5" rx="2"/>
    <rect x="170" y="250" width="180" height="30" fill="#5a5a5a" opacity="0.5" rx="2"/>
    
    <!-- Trial Spawner (center) -->
    <rect x="220" y="140" width="80" height="80" fill="#2a2a3a" rx="4" stroke="#4fc3f7" stroke-width="2" opacity="0.8"/>
    <rect x="230" y="150" width="60" height="60" fill="#1a1a2a" rx="2"/>
    <circle cx="260" cy="180" r="20" fill="#4fc3f7" opacity="0.3" filter="url(#glow)"/>
    <circle cx="260" cy="180" r="10" fill="#4fc3f7" opacity="0.6"/>
    <circle cx="260" cy="180" r="4" fill="white" opacity="0.9"/>
    
    <!-- Vault blocks -->
    <rect x="60" y="140" width="50" height="60" fill="#3a2a4a" rx="3" stroke="#ce93d8" stroke-width="1.5" opacity="0.7"/>
    <rect x="410" y="140" width="50" height="60" fill="#3a2a4a" rx="3" stroke="#ce93d8" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Breeze mob (left) -->
    <g transform="translate(100,160)">
      <rect x="0" y="0" width="24" height="30" fill="#a8d8ea" opacity="0.8" rx="4"/>
      <rect x="4" y="4" width="16" height="12" fill="#4fc3f7" opacity="0.6" rx="2"/>
      <circle cx="8" cy="10" r="2" fill="white" opacity="0.9"/>
      <circle cx="16" cy="10" r="2" fill="white" opacity="0.9"/>
      <rect x="-8" y="8" width="8" height="4" fill="#a8d8ea" opacity="0.6" rx="1"/>
      <rect x="24" y="8" width="8" height="4" fill="#a8d8ea" opacity="0.6" rx="1"/>
      <rect x="4" y="30" width="6" height="14" fill="#a8d8ea" opacity="0.7" rx="1"/>
      <rect x="14" y="30" width="6" height="14" fill="#a8d8ea" opacity="0.7" rx="1"/>
    </g>
    
    <!-- Wind charge effects -->
    <circle cx="140" cy="170" r="8" fill="#4fc3f7" opacity="0.4" filter="url(#glow)"/>
    <circle cx="155" cy="155" r="5" fill="#4fc3f7" opacity="0.3" filter="url(#glow)"/>
    <circle cx="130" cy="155" r="4" fill="#4fc3f7" opacity="0.2" filter="url(#glow)"/>
  </g>
  
  <!-- Ground -->
  <rect y="440" width="1920" height="160" fill="#1a3a2a"/>
  
  <!-- Grass blocks -->
  <g fill="#2e7d32" stroke="#1b5e20" stroke-width="0.5" opacity="0.8">
    <rect x="0" y="440" width="40" height="40"/>
    <rect x="40" y="440" width="40" height="40"/>
    <rect x="80" y="440" width="40" height="40"/>
    <rect x="120" y="440" width="40" height="40"/>
    <rect x="160" y="440" width="40" height="40"/>
    <rect x="200" y="440" width="40" height="40"/>
    <rect x="240" y="440" width="40" height="40"/>
    <rect x="280" y="440" width="40" height="40"/>
    <rect x="320" y="440" width="40" height="40"/>
    <rect x="360" y="440" width="40" height="40"/>
    <rect x="400" y="440" width="40" height="40"/>
    <rect x="440" y="440" width="40" height="40"/>
    <rect x="480" y="440" width="40" height="40"/>
    <rect x="520" y="440" width="40" height="40"/>
    <rect x="560" y="440" width="40" height="40"/>
    <rect x="600" y="440" width="40" height="40"/>
    <rect x="640" y="440" width="40" height="40"/>
    <rect x="680" y="440" width="40" height="40"/>
    <rect x="720" y="440" width="40" height="40"/>
    <rect x="760" y="440" width="40" height="40"/>
    <rect x="800" y="440" width="40" height="40"/>
    <rect x="840" y="440" width="40" height="40"/>
    <rect x="880" y="440" width="40" height="40"/>
    <rect x="920" y="440" width="40" height="40"/>
    <rect x="960" y="440" width="40" height="40"/>
    <rect x="1000" y="440" width="40" height="40"/>
    <rect x="1040" y="440" width="40" height="40"/>
    <rect x="1080" y="440" width="40" height="40"/>
    <rect x="1120" y="440" width="40" height="40"/>
    <rect x="1160" y="440" width="40" height="40"/>
    <rect x="1200" y="440" width="40" height="40"/>
    <rect x="1240" y="440" width="40" height="40"/>
    <rect x="1280" y="440" width="40" height="40"/>
    <rect x="1320" y="440" width="40" height="40"/>
    <rect x="1360" y="440" width="40" height="40"/>
    <rect x="1400" y="440" width="40" height="40"/>
    <rect x="1440" y="440" width="40" height="40"/>
    <rect x="1480" y="440" width="40" height="40"/>
    <rect x="1520" y="440" width="40" height="40"/>
    <rect x="1560" y="440" width="40" height="40"/>
    <rect x="1600" y="440" width="40" height="40"/>
    <rect x="1640" y="440" width="40" height="40"/>
    <rect x="1680" y="440" width="40" height="40"/>
    <rect x="1720" y="440" width="40" height="40"/>
    <rect x="1760" y="440" width="40" height="40"/>
    <rect x="1800" y="440" width="40" height="40"/>
    <rect x="1840" y="440" width="40" height="40"/>
    <rect x="1880" y="440" width="40" height="40"/>
  </g>
  
  <!-- Dirt layer -->
  <rect y="480" width="1920" height="120" fill="#5d4037" opacity="0.8"/>
  
  <!-- Copper ore in ground -->
  <g transform="translate(300,480)">
    <rect width="40" height="40" fill="#5d4037" stroke="#4e342e" stroke-width="0.5"/>
    <rect x="8" y="8" width="10" height="10" fill="#d4874a" opacity="0.8"/>
    <rect x="22" y="18" width="10" height="10" fill="#b87333" opacity="0.7"/>
  </g>
  
  <!-- Trees -->
  <g transform="translate(150,340)">
    <rect x="15" y="40" width="30" height="60" fill="#5d4037" stroke="#3e2723" stroke-width="0.5"/>
    <rect x="-5" y="0" width="70" height="50" fill="#1b5e20" stroke="#0d3310" stroke-width="0.5"/>
    <rect x="-15" y="10" width="90" height="35" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.5"/>
    <rect x="0" y="20" width="60" height="25" fill="#388e3c" stroke="#2e7d32" stroke-width="0.5"/>
  </g>
  
  <g transform="translate(1600,360)">
    <rect x="12" y="30" width="24" height="50" fill="#5d4037" stroke="#3e2723" stroke-width="0.5"/>
    <rect x="-5" y="0" width="58" height="40" fill="#1b5e20" stroke="#0d3310" stroke-width="0.5"/>
    <rect x="-12" y="8" width="72" height="30" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.5"/>
  </g>
  
  <!-- Mace weapon (floating) -->
  <g transform="translate(960,350)" filter="url(#glow)">
    <rect x="-3" y="-40" width="6" height="50" fill="#5d4037" rx="2"/>
    <rect x="-15" y="-55" width="30" height="20" fill="#4a4a5a" rx="3"/>
    <rect x="-12" y="-52" width="24" height="14" fill="#6a6a7a" rx="2"/>
    <circle cx="0" cy="-45" r="5" fill="#4fc3f7" opacity="0.6"/>
  </g>
  
  <!-- Overlay vignette -->
  <rect width="1920" height="600" fill="url(#sky)" opacity="0.1"/>
  <rect width="1920" height="600" rx="0" fill="none" stroke="#0a0e2a" stroke-width="200" stroke-opacity="0.3"/>
</svg>