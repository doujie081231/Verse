<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Creeper face in frame -->
  <!-- Frame border -->
  <rect x="1" y="1" width="14" height="1" fill="currentColor"/>
  <rect x="1" y="2" width="1" height="12" fill="currentColor"/>
  <rect x="14" y="2" width="1" height="12" fill="currentColor"/>
  <rect x="2" y="14" width="12" height="1" fill="currentColor"/>
  <!-- Eyes -->
  <rect x="4" y="4" width="3" height="3" fill="currentColor"/>
  <rect x="9" y="4" width="3" height="3" fill="currentColor"/>
  <!-- Nose/mouth area -->
  <rect x="6" y="7" width="4" height="1" fill="currentColor"/>
  <rect x="5" y="8" width="1" height="2" fill="currentColor"/>
  <rect x="10" y="8" width="1" height="2" fill="currentColor"/>
  <rect x="6" y="9" width="4" height="1" fill="currentColor"/>
  <rect x="7" y="10" width="2" height="1" fill="currentColor"/>
</svg>