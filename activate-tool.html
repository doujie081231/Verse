<!-- activate-tool.html - VersePC 密钥激活工具 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersePC 密钥激活工具</title>
  <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; margin-bottom: 8px; color: #333; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .info-box { background: #f0f4ff; border-left: 4px solid #667eea; padding: 12px 16px; margin-bottom: 24px; border-radius: 0 8px 8px 0; font-size: 14px; color: #555; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        button:active { transform: translateY(0); }
        .result { margin-top: 24px; display: none; }
        .result.show { display: block; }
        .result-label { font-size: 12px; color: #999; margin-bottom: 8px; }
        .result-code { background: #f8f9fa; border: 2px dashed #667eea; border-radius: 8px; padding: 16px; text-align: center; font-size: 20px; font-weight: bold; color: #764ba2; cursor: pointer; word-break: break-all; font-family: 'Courier New', monospace; transition: background 0.2s; }
        .result-code:hover { background: #f0f0f0; }
        .copy-hint { text-align: center; font-size: 12px; color: #999; margin-top: 8px; }
        .version-group { display: none; }
    </style>
</head>
<body>
  <div class="container">
    <h1>🔑 VersePC 密钥激活工具</h1>
    <p class="subtitle">生成激活码用于解锁AI助手功能</p>

    <div class="info-box">
      💡 机器识别码可在 VersePC 设置页面获取
    </div>

    <div class="form-group">
      <label for="machineId">机器识别码 (15-16位大写字母)</label>
      <input type="text" id="machineId" placeholder="例如: A1B2C3D4E5F6G7H8" maxlength="16" style="text-transform: uppercase;">
    </div>

    <div class="form-group">
      <label for="type">激活码类型</label>
      <select id="type">
        <option value="permanent">VP - 永久激活码</option>
        <option value="single">VS - 单次激活码（更新后失效）</option>
      </select>
    </div>

    <div class="form-group version-group" id="versionGroup">
      <label for="version">兼容版本号（多版本用逗号分隔）</label>
      <input type="text" id="version" value="1.3.41,1.3.4,1.3.3,1.3.2,1.3.1,1.3.0,1.0.1,1.0.0" placeholder="例如: 1.3.41,1.0.1">
    </div>

    <button onclick="generate()">生成激活码</button>

    <div class="result" id="result">
      <div class="result-label">生成的激活码 (点击复制)</div>
      <div class="result-code" id="resultCode" onclick="copyCode()"></div>
      <div class="copy-hint">点击上方激活码即可复制</div>
    </div>
  </div>

  <script>
        const SECRET = 'VersePC$ecureK3y#2026@Activation!Gen';
        const HASH_LEN = 12;

        document.getElementById('type').addEventListener('change', function() {
            document.getElementById('versionGroup').style.display =
                this.value === 'single' ? 'block' : 'none';
        });

        async function hmacSha256(message) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(SECRET);
            const msgData = encoder.encode(message);
            const key = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
            const sig = await crypto.subtle.sign('HMAC', key, msgData);
            return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function generate() {
            const machineId = document.getElementById('machineId').value.trim().toUpperCase();
            const type = document.getElementById('type').value;
            const versionStr = document.getElementById('version').value.trim() || '1.3.41';

            if (!machineId || machineId.length < 15 || machineId.length > 16) {
                alert('请输入15-16位大写字母的机器识别码');
                return;
            }

            if (type === 'permanent') {
                const data = machineId + '|PERM';
                const prefix = 'VP';
                const hash = (await hmacSha256(data)).toUpperCase().substring(0, HASH_LEN);
                const code = prefix + '-' + hash;

                document.getElementById('resultCode').textContent = code;
                document.getElementById('result').classList.add('show');
                return;
            }

            const versions = versionStr.split(',').map(v => v.trim()).filter(Boolean);
            const prefix = 'VS';
            const results = [];
            for (const v of versions) {
                const data = machineId + '|SINGLE|' + v;
                const hash = (await hmacSha256(data)).toUpperCase().substring(0, HASH_LEN);
                results.push(prefix + '-' + hash);
            }

            document.getElementById('resultCode').textContent = results.join('\n');
            document.getElementById('result').classList.add('show');
        }

        function copyCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const hint = document.querySelector('.copy-hint');
                hint.textContent = '✓ 已复制到剪贴板';
                setTimeout(() => { hint.textContent = '点击上方激活码即可复制'; }, 2000);
            });
        }
    </script>
</body>
</html>
