<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VersePC 密钥激活工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input[type="text"], select {
            width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 16px; transition: border-color 0.3s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
        .result { margin-top: 24px; padding: 20px; background: #f8f9fa; border-radius: 8px; display: none; }
        .result.show { display: block; }
        .result-label { color: #666; font-size: 12px; margin-bottom: 8px; }
        .result-code {
            font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold;
            color: #667eea; word-break: break-all; cursor: pointer; padding: 10px;
            background: white; border-radius: 6px; border: 1px solid #e0e0e0;
        }
        .result-code:hover { background: #f0f0f0; }
        .copy-hint { color: #999; font-size: 12px; margin-top: 8px; text-align: center; }
        .info-box {
            background: #e8f4fd; border-left: 4px solid #667eea; padding: 12px 16px;
            margin-bottom: 20px; border-radius: 0 8px 8px 0; font-size: 13px; color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 VersePC 密钥激活工具</h1>
        <p class="subtitle">生成激活码用于解锁AI助手功能</p>
        
        <div class="info-box">
            💡 机器识别码可在 VersePC 设置页面获取
        </div>
        
        <div class="form-group">
            <label for="machineId">机器识别码 (16位大写字母)</label>
            <input type="text" id="machineId" placeholder="例如: A1B2C3D4E5F6G7H8" maxlength="16" style="text-transform: uppercase;">
        </div>
        
        <div class="form-group">
            <label for="type">激活码类型</label>
            <select id="type">
                <option value="permanent">VP - 永久激活码</option>
                <option value="single">VS - 单次激活码</option>
            </select>
        </div>
        
        <div class="form-group" id="versionGroup">
            <label for="version">版本号</label>
            <input type="text" id="version" value="1.3.0" placeholder="例如: 1.3.0">
        </div>
        
        <button class="btn" onclick="generate()">生成激活码</button>
        
        <div class="result" id="result">
            <div class="result-label">生成的激活码 (点击复制)</div>
            <div class="result-code" id="resultCode" onclick="copyCode()"></div>
            <div class="copy-hint">点击上方激活码即可复制</div>
        </div>
    </div>

    <script>
        const SECRET = 'VersePC$ecureK3y#2026@Activation!Gen';
        const HASH_LEN = 12;

        document.getElementById('type').addEventListener('change', function() {
            document.getElementById('versionGroup').style.display = 
                this.value === 'single' ? 'block' : 'none';
        });

        function generate() {
            const machineId = document.getElementById('machineId').value.trim().toUpperCase();
            const type = document.getElementById('type').value;
            const version = document.getElementById('version').value.trim() || '1.3.0';

            if (!machineId || machineId.length !== 16) {
                alert('请输入16位大写字母的机器识别码');
                return;
            }

            let data;
            if (type === 'permanent') {
                data = machineId + '|PERM';
            } else {
                data = machineId + '|SINGLE|' + version;
            }

            const prefix = type === 'permanent' ? 'VP' : 'VS';
            const hash = hmacSha256(SECRET, data).toUpperCase().substring(0, HASH_LEN);
            const code = prefix + '-' + hash;

            document.getElementById('resultCode').textContent = code;
            document.getElementById('result').classList.add('show');
        }

        function copyCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const hint = document.querySelector('.copy-hint');
                hint.textContent = '✓ 已复制到剪贴板';
                setTimeout(() => { hint.textContent = '点击上方激活码即可复制'; }, 2000);
            });
        }

        function hmacSha256(key, message) {
            const blocksize = 64;
            let ik = [];
            if (key.length > blocksize) key = sha256(key);
            for (let i = 0; i < blocksize; i++) ik[i] = (key.charCodeAt(i) || 0) ^ 0x36;
            let ok = [];
            for (let i = 0; i < blocksize; i++) ok[i] = (key.charCodeAt(i) || 0) ^ 0x5c;
            const inner = sha256(String.fromCharCode(...ik) + message);
            const outer = sha256(String.fromCharCode(...ok) + inner);
            return outer;
        }

        function sha256(message) {
            function rightRotate(value, amount) { return (value >>> amount) | (value << (32 - amount)); }
            const maxWord = 2**32;
            const K = [
                0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
                0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
                0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
                0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
                0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
                0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
                0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
                0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
            ];
            message = message + String.fromCharCode(0x80);
            const l = message.length / 4 + 2;
            const N = Math.ceil(l / 16);
            const M = new Array(N);
            for (let i = 0; i < N; i++) {
                M[i] = new Array(16);
                for (let j = 0; j < 16; j++) {
                    M[i][j] = message.charCodeAt(i*64+j*4)<<24 | message.charCodeAt(i*64+j*4+1)<<16 |
                              message.charCodeAt(i*64+j*4+2)<<8 | message.charCodeAt(i*64+j*4+3);
                }
            }
            M[N-1][14] = Math.floor(message.length*8/maxWord);
            M[N-1][15] = message.length*8 & (maxWord-1);
            let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
            for (let i = 0; i < N; i++) {
                const W = new Array(64);
                for (let t = 0; t < 16; t++) W[t] = M[i][t];
                for (let t = 16; t < 64; t++) {
                    const s0 = rightRotate(W[t-15],7)^rightRotate(W[t-15],18)^(W[t-15]>>>3);
                    const s1 = rightRotate(W[t-2],17)^rightRotate(W[t-2],19)^(W[t-2]>>>10);
                    W[t] = (W[t-16]+s0+W[t-7]+s1) & (maxWord-1);
                }
                let [a,b,c,d,e,f,g,h] = H;
                for (let t = 0; t < 64; t++) {
                    const S1 = rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25);
                    const ch = (e&f)^(~e&g);
                    const temp1 = (h+S1+ch+K[t]+W[t]) & (maxWord-1);
                    const S0 = rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22);
                    const maj = (a&b)^(a&c)^(b&c);
                    const temp2 = (S0+maj) & (maxWord-1);
                    h=g; g=f; f=e; e=(d+temp1)&(maxWord-1); d=c; c=b; b=a; a=(temp1+temp2)&(maxWord-1);
                }
                H[0]=(H[0]+a)&(maxWord-1); H[1]=(H[1]+b)&(maxWord-1); H[2]=(H[2]+c)&(maxWord-1);
                H[3]=(H[3]+d)&(maxWord-1); H[4]=(H[4]+e)&(maxWord-1); H[5]=(H[5]+f)&(maxWord-1);
                H[6]=(H[6]+g)&(maxWord-1); H[7]=(H[7]+h)&(maxWord-1);
            }
            return H.map(h => h.toString(16).padStart(8,'0')).join('');
        }
    </script>
</body>
</html>
